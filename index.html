<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スケジュール一括調整 (共有版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .cell-input:focus { outline: none; background-color: #f8fafc; }
        .symbol-btn { transition: all 0.2s; }
        .symbol-btn.active { transform: scale(1.1); font-weight: bold; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-700">スケジュール一括調整</h1>
                <p id="status-text" class="text-gray-500 mt-2">接続を初期化中...</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <input type="date" id="date-input" class="px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="addDate()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-indigo-700 shadow-sm active:scale-95 transition-transform">
                    日程追加
                </button>
                <button onclick="resetData()" class="px-4 py-2 rounded-lg border border-red-200 text-red-500 hover:bg-red-50 text-sm font-medium transition-colors">
                    データ全消去
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse min-w-[600px]" id="schedule-table">
                    <thead>
                        <tr class="bg-gray-100" id="header-row">
                            <!-- JSで描画 -->
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                        <!-- JSで描画 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="empty-state" class="mt-20 text-center hidden">
            <div class="text-gray-300 mb-4">
                <svg class="mx-auto w-24 h-24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <p class="text-gray-400 font-medium">候補日を追加して調整を始めてください</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State
        let state = {
            dates: [],
            participants: ['参加者1'],
            data: {}
        };
        let user = null;
        let isFirstLoad = true;

        const statusText = document.getElementById('status-text');

        // Exponential backoff helper
        const withRetry = async (fn, retries = 5, delay = 1000) => {
            try {
                return await fn();
            } catch (err) {
                if (retries <= 0) throw err;
                await new Promise(resolve => setTimeout(resolve, delay));
                return withRetry(fn, retries - 1, delay * 2);
            }
        };

        // Auth Init (Rule 3)
        const initAuth = async () => {
            try {
                await withRetry(async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
                statusText.innerText = "接続に失敗しました。ページを更新してください。";
            }
        };

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                statusText.innerText = "オンライン: 同期を開始...";
                subscribeToData();
            }
        });

        initAuth();

        // Data Sync
        function subscribeToData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'main');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    state = docSnap.data();
                    statusText.innerText = "オンライン: 最新の状態です";
                } else {
                    if (isFirstLoad) {
                        // ドキュメントがない場合は空の状態で描画
                        statusText.innerText = "オンライン: 新規シート";
                    }
                }
                isFirstLoad = false;
                render();
            }, (error) => {
                console.error("Snapshot error:", error);
                statusText.innerText = "同期に問題が発生しました。";
                // 初回読み込みでエラーが出た場合でも、操作できるように空で描画
                if (isFirstLoad) render();
            });
        }

        async function pushData() {
            if (!user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'schedules', 'main');
            try {
                await setDoc(docRef, state);
                statusText.innerText = "オンライン: 保存完了";
            } catch (error) {
                console.error("Save error:", error);
                statusText.innerText = "保存に失敗しました。";
            }
        }

        // App Logic
        window.addDate = function() {
            const dateInput = document.getElementById('date-input');
            if (!dateInput.value) return;
            if (!state.dates.includes(dateInput.value)) {
                state.dates.push(dateInput.value);
                state.dates.sort();
                pushData();
            }
            dateInput.value = '';
        };

        window.removeDate = function(date) {
            if (confirm(`${date} の行を削除しますか？`)) {
                state.dates = state.dates.filter(d => d !== date);
                if (state.data) {
                    Object.keys(state.data).forEach(key => {
                        if (key.startsWith(`${date}-`)) delete state.data[key];
                    });
                }
                pushData();
            }
        };

        window.addParticipant = function() {
            const name = prompt("参加者の名前を入力してください");
            if (name && name.trim()) {
                state.participants.push(name.trim());
                pushData();
            }
        };

        window.removeParticipant = function(index) {
            if (confirm(`${state.participants[index]} さんを削除しますか？`)) {
                state.participants.splice(index, 1);
                pushData();
            }
        };

        window.updateCell = function(date, pIdx, field, value) {
            const key = `${date}-${pIdx}`;
            if (!state.data) state.data = {};
            if (!state.data[key]) {
                state.data[key] = { symbol: 'ー', note: '' };
            }
            state.data[key][field] = value;
            pushData();
        };

            window.resetData = function() {
            if (confirm("すべてのデータを消去して初期状態に戻しますか？")) {
                state = {
                    dates: [],
                    participants: ['参加者1'],
                    data: {}
                };
                pushData();
            }
        };

        function render() {
            const headerRow = document.getElementById('header-row');
            const body = document.getElementById('schedule-body');
            const emptyState = document.getElementById('empty-state');

            if (!state.dates || state.dates.length === 0) {
                emptyState.classList.remove('hidden');
                body.innerHTML = '';
                headerRow.innerHTML = '';
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            // Render Header
            headerRow.innerHTML = `
                <th class="p-4 border-b-2 border-gray-200 text-left w-48 sticky left-0 bg-gray-100 z-20">候補日 / 参加者</th>
                ${state.participants.map((p, i) => `
                    <th class="p-4 border-b-2 border-gray-200 text-center min-w-[160px] relative group">
                        <div class="flex items-center justify-center gap-2">
                            <span class="font-bold text-gray-700">${p}</span>
                            <button onclick="removeParticipant(${i})" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </th>
                `).join('')}
                <th class="p-4 border-b-2 border-gray-200 text-center w-32 bg-gray-50">
                    <button onclick="addParticipant()" class="text-indigo-600 hover:text-indigo-800 font-bold text-xs flex items-center justify-center gap-1 w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        追加
                    </button>
                </th>
            `;

            // Render Body
            body.innerHTML = state.dates.map(date => {
                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 border-b border-gray-100 font-bold text-gray-600 sticky left-0 bg-white z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                            <div class="flex items-center justify-between">
                                <span>${date}</span>
                                <button onclick="removeDate('${date}')" class="text-gray-300 hover:text-red-400 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                            </div>
                        </td>
                        ${state.participants.map((_, pIdx) => {
                            const cellData = (state.data && state.data[`${date}-${pIdx}`]) || { symbol: 'ー', note: '' };
                            const colorClass = 
                                cellData.symbol === '○' ? 'bg-green-50 text-green-700 border-green-200' :
                                cellData.symbol === '△' ? 'bg-yellow-50 text-yellow-700 border-yellow-200' :
                                cellData.symbol === '×' ? 'bg-red-50 text-red-700 border-red-200' : 
                                'bg-white text-gray-300 border-gray-100';

                            return `
                                <td class="p-2 border-b border-gray-100 text-center">
                                    <div class="flex flex-col gap-2 p-2 rounded-xl border-2 ${colorClass} transition-all duration-300">
                                        <div class="flex justify-center gap-1">
                                            ${['○', '△', '×'].map(s => `
                                                <button 
                                                    onclick="updateCell('${date}', ${pIdx}, 'symbol', '${s}')"
                                                    class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold border-2 ${cellData.symbol === s ? 'bg-white shadow-md border-current scale-110' : 'bg-transparent border-transparent opacity-30 hover:opacity-100'}"
                                                >${s}</button>
                                            `).join('')}
                                        </div>
                                        <input 
                                            type="text" 
                                            placeholder="メモ入力..." 
                                            value="${cellData.note}"
                                            onchange="updateCell('${date}', ${pIdx}, 'note', this.value)"
                                            class="w-full bg-transparent text-[11px] text-center border-b border-transparent focus:border-indigo-300 outline-none placeholder-gray-400 pb-1"
                                        >
                                    </div>
                                </td>
                            `;
                        }).join('')}
                        <td class="p-2 border-b border-gray-100 bg-gray-50/30"></td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
